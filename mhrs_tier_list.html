<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MHR:S — Skill Tier List</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0e0c0a;
  --bg2:#141210;
  --bg3:#1c1915;
  --panel:#201d18;
  --border:#3a3326;
  --border2:#4a4235;
  --gold:#c9a84c;
  --gold-light:#e8c97a;
  --gold-dim:#7a6230;
  --amber:#d4820a;
  --amber-dim:#6b4205;
  --text:#e8dfc8;
  --text-dim:#8a7d6a;
  --text-muted:#5a5040;
  --tier-s:#ff6b35;
  --tier-a:#e8c97a;
  --tier-b:#6bbf8e;
  --tier-c:#7eb8d4;
  --tier-n:#5a5a6a;
  --tier-x:#c94040;
  --tier-s-bg:#2a150a;
  --tier-a-bg:#221a08;
  --tier-b-bg:#0a1e14;
  --tier-c-bg:#0a141e;
  --tier-n-bg:#141418;
  --tier-x-bg:#1e0a0a;
  --r:4px;--rl:8px;--tr:0.18s ease
}

html{scroll-behavior:smooth}

body{
  background-color:var(--bg);
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -20%,rgba(201,168,76,.07) 0%,transparent 60%),
    repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(58,51,38,.12) 39px,rgba(58,51,38,.12) 40px),
    repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(58,51,38,.06) 39px,rgba(58,51,38,.06) 40px);
  color:var(--text);
  font-family:'Crimson Pro',Georgia,serif;
  font-size:16px;
  line-height:1.5;
  min-height:100vh
}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gold)}

/* HEADER */
header{text-align:center;padding:3rem 1rem 2rem;position:relative;overflow:hidden}
.halo{position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse 60% 80% at 50% 0%,rgba(201,168,76,.1) 0%,transparent 70%);pointer-events:none}
.pre{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.35em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:.5rem}
h1{font-family:'Cinzel',serif;font-weight:900;font-size:clamp(1.8rem,5vw,3.2rem);color:var(--gold-light);letter-spacing:.08em;line-height:1;text-shadow:0 0 40px rgba(201,168,76,.4),0 2px 4px rgba(0,0,0,.8);margin-bottom:.4rem}
.sub{font-style:italic;color:var(--text-dim);font-size:1rem;letter-spacing:.03em}
.hrule{display:flex;align-items:center;gap:1rem;margin:1.5rem auto 0;max-width:500px}
.hrule::before,.hrule::after{content:'';flex:1;height:1px}
.hrule::before{background:linear-gradient(90deg,transparent,var(--gold-dim))}
.hrule::after{background:linear-gradient(270deg,transparent,var(--gold-dim))}
.gem{width:8px;height:8px;background:var(--gold);transform:rotate(45deg);box-shadow:0 0 8px rgba(201,168,76,.6)}

/* LAYOUT */
.app{max-width:1400px;margin:0 auto;padding:0 1rem 4rem}

/* SECTION LABEL */
.slabel{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.3em;color:var(--gold-dim);text-transform:uppercase;margin-bottom:.6rem;padding-left:.15rem}

/* WEAPON GRID */
.wgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:.45rem;margin-bottom:1.5rem}
.wbtn{background:var(--panel);border:1px solid var(--border);color:var(--text-dim);padding:.5rem .4rem;font-family:'Cinzel',serif;font-size:.68rem;font-weight:600;letter-spacing:.04em;cursor:pointer;border-radius:var(--r);transition:all var(--tr);text-align:center;display:flex;flex-direction:column;align-items:center;gap:.15rem;line-height:1.2}
.wbtn span.ab{font-size:.55rem;color:var(--text-muted);font-weight:400;letter-spacing:.12em}
.wbtn:hover{border-color:var(--gold-dim);color:var(--text);background:var(--bg3)}
.wbtn.active{background:linear-gradient(135deg,#2a2210,#1a1608);border-color:var(--gold);color:var(--gold-light);box-shadow:0 0 12px rgba(201,168,76,.15),inset 0 1px 0 rgba(201,168,76,.1)}
.wbtn.active span.ab{color:var(--gold-dim)}

/* CONTROLS */
.ctrl{display:flex;flex-wrap:wrap;gap:.7rem;align-items:center;margin-bottom:1.5rem;padding:.85rem 1.1rem;background:var(--panel);border:1px solid var(--border);border-radius:var(--rl)}
.srchwrap{flex:1;min-width:180px;position:relative}
.srchwrap svg{position:absolute;left:.7rem;top:50%;transform:translateY(-50%);opacity:.35;pointer-events:none}
.srch{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:'Crimson Pro',serif;font-size:.95rem;padding:.42rem .7rem .42rem 2.1rem;border-radius:var(--r);outline:none;transition:border-color var(--tr)}
.srch:focus{border-color:var(--gold-dim)}
.srch::placeholder{color:var(--text-muted)}
.fgroup{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.flabel{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.2em;color:var(--text-muted);text-transform:uppercase;margin-right:.15rem}
.fbtn{background:var(--bg3);border:1px solid var(--border);color:var(--text-dim);font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.06em;padding:.28rem .58rem;cursor:pointer;border-radius:var(--r);transition:all var(--tr);white-space:nowrap}
.fbtn:hover{border-color:var(--gold-dim);color:var(--text)}
.fbtn.active{background:var(--amber-dim);border-color:var(--amber);color:var(--gold-light)}
.nxbtn{background:var(--bg3);border:1px solid var(--border);color:var(--text-muted);font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.06em;padding:.28rem .58rem;cursor:pointer;border-radius:var(--r);transition:all var(--tr);white-space:nowrap;margin-left:auto}
.nxbtn:hover{border-color:var(--tier-x);color:var(--tier-x)}
.nxbtn.on{border-color:var(--tier-x);color:var(--tier-x);background:#2a0808}

/* LEGEND */
.legend{display:flex;flex-wrap:wrap;gap:.45rem 1.2rem;margin-bottom:1.5rem;padding:0 .2rem}
.li{display:flex;align-items:center;gap:.4rem;font-size:.8rem;color:var(--text-dim)}
.lp{width:20px;height:20px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:.62rem;font-weight:700}

/* TIER SECTIONS */
.ts{margin-bottom:1.5rem}
.thead{display:flex;align-items:center;gap:.75rem;margin-bottom:.7rem}
.tbadge{width:34px;height:34px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:1rem;font-weight:900;flex-shrink:0;border:1px solid}
.ttitle{font-family:'Cinzel',serif;font-size:.67rem;letter-spacing:.2em;text-transform:uppercase}
.tcount{font-family:'Cinzel',serif;font-size:.58rem;color:var(--text-muted);margin-left:auto}
.trule{flex:1;height:1px;opacity:.22}

.ts-S .tbadge{color:var(--tier-s);border-color:var(--tier-s);background:var(--tier-s-bg)}
.ts-A .tbadge{color:var(--tier-a);border-color:var(--tier-a);background:var(--tier-a-bg)}
.ts-B .tbadge{color:var(--tier-b);border-color:var(--tier-b);background:var(--tier-b-bg)}
.ts-C .tbadge{color:var(--tier-c);border-color:var(--tier-c);background:var(--tier-c-bg)}
.ts-N .tbadge{color:var(--tier-n);border-color:var(--tier-n);background:var(--tier-n-bg)}
.ts-X .tbadge{color:var(--tier-x);border-color:var(--tier-x);background:var(--tier-x-bg)}
.ts-S .ttitle{color:var(--tier-s)} .ts-A .ttitle{color:var(--tier-a)}
.ts-B .ttitle{color:var(--tier-b)} .ts-C .ttitle{color:var(--tier-c)}
.ts-N .ttitle{color:var(--tier-n)} .ts-X .ttitle{color:var(--tier-x)}
.ts-S .trule{background:var(--tier-s)} .ts-A .trule{background:var(--tier-a)}
.ts-B .trule{background:var(--tier-b)} .ts-C .trule{background:var(--tier-c)}
.ts-N .trule{background:var(--tier-n)} .ts-X .trule{background:var(--tier-x)}

/* SKILL GRID */
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:.65rem}

/* SKILL CARD */
.sc{background:var(--panel);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;transition:border-color var(--tr),transform var(--tr),box-shadow var(--tr);display:flex;flex-direction:column}
.sc:hover{transform:translateY(-1px);box-shadow:0 4px 18px rgba(0,0,0,.45)}
.sc-S{border-left:3px solid var(--tier-s)}
.sc-S:hover{border-color:var(--tier-s);box-shadow:0 4px 20px rgba(255,107,53,.12)}
.sc-A{border-left:3px solid var(--tier-a)}
.sc-A:hover{border-color:var(--tier-a);box-shadow:0 4px 20px rgba(232,201,122,.1)}
.sc-B{border-left:3px solid var(--tier-b)}
.sc-B:hover{border-color:var(--tier-b);box-shadow:0 4px 20px rgba(107,191,142,.1)}
.sc-C{border-left:3px solid var(--tier-c)}
.sc-N{border-left:3px solid var(--tier-n);opacity:.65}
.sc-X{border-left:3px solid var(--tier-x)}
.sc-X:hover{border-color:var(--tier-x);box-shadow:0 4px 20px rgba(201,64,64,.12)}

.sc-head{padding:.7rem .9rem .55rem;display:flex;align-items:flex-start;gap:.65rem}
.sc-pip{width:24px;height:24px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:.65rem;font-weight:900;flex-shrink:0;margin-top:1px;border:1px solid}
.sc-S .sc-pip{background:var(--tier-s-bg);color:var(--tier-s);border-color:var(--tier-s)}
.sc-A .sc-pip{background:var(--tier-a-bg);color:var(--tier-a);border-color:var(--tier-a)}
.sc-B .sc-pip{background:var(--tier-b-bg);color:var(--tier-b);border-color:var(--tier-b)}
.sc-C .sc-pip{background:var(--tier-c-bg);color:var(--tier-c);border-color:var(--tier-c)}
.sc-N .sc-pip{background:var(--tier-n-bg);color:var(--tier-n);border-color:var(--tier-n)}
.sc-X .sc-pip{background:var(--tier-x-bg);color:var(--tier-x);border-color:var(--tier-x)}

.sc-tw{flex:1;min-width:0}
.sc-name{font-family:'Cinzel',serif;font-size:.82rem;font-weight:700;color:var(--text);letter-spacing:.02em;line-height:1.2;margin-bottom:.15rem}
.sc-cat{font-size:.7rem;color:var(--text-muted);letter-spacing:.04em}
.sc-deco{padding:0 .9rem 0 3rem;margin-bottom:.5rem}
.deco-tag{background:var(--bg3);border:1px solid var(--border2);border-radius:3px;font-size:.65rem;color:var(--gold-dim);font-family:'Cinzel',serif;padding:.12rem .4rem;letter-spacing:.02em;display:inline-block;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sc-desc{padding:0 .9rem 0 3rem;font-size:.82rem;color:var(--text-dim);font-style:italic;margin-bottom:.5rem;line-height:1.4}
.sc-toggle{display:flex;align-items:center;gap:.4rem;padding:.3rem .9rem;background:none;border:none;border-top:1px solid var(--border);color:var(--text-muted);font-family:'Crimson Pro',serif;font-size:.72rem;cursor:pointer;width:100%;text-align:left;transition:color var(--tr),background var(--tr);margin-top:auto}
.sc-toggle:hover{color:var(--text-dim);background:rgba(255,255,255,.02)}
.sc-toggle svg{transition:transform .2s;flex-shrink:0}
.sc-toggle.open svg{transform:rotate(180deg)}
.sc-details{display:none;padding:.55rem .9rem .7rem;border-top:1px solid var(--border)}
.sc-details.open{display:block;animation:fi .15s ease}
@keyframes fi{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:none}}
.lvls{list-style:none;display:flex;flex-direction:column;gap:.18rem;margin-bottom:.55rem}
.lvls li{font-size:.78rem;color:var(--text-dim);display:flex;gap:.45rem;align-items:baseline}
.lvpip{background:var(--border2);color:var(--gold-dim);font-family:'Cinzel',serif;font-size:.52rem;padding:.04rem .28rem;border-radius:2px;flex-shrink:0}
.note{font-size:.76rem;color:var(--gold-dim);background:rgba(201,168,76,.05);border-left:2px solid var(--gold-dim);padding:.32rem .55rem;border-radius:0 3px 3px 0;font-style:italic;line-height:1.4}

.empty{text-align:center;padding:4rem 2rem;color:var(--text-muted);font-style:italic;font-size:1.1rem}

@media(max-width:600px){
  .sgrid{grid-template-columns:1fr}
  .wgrid{grid-template-columns:repeat(auto-fill,minmax(75px,1fr))}
  .ctrl{flex-direction:column;align-items:stretch}
  .nxbtn{margin-left:0}
}
</style>
</head>
<body>

<header>
  <div class="halo"></div>
  <p class="pre">Monster Hunter Rise: Sunbreak &mdash; v16.0.0 Final Update</p>
  <h1>Skill Tier List</h1>
  <p class="sub">Per-weapon ratings for all 14 weapon classes &middot; Rise &amp; Sunbreak</p>
  <div class="hrule"><div class="gem"></div></div>
</header>

<main class="app">

  <p class="slabel">Select Weapon</p>
  <div class="wgrid" id="wgrid"></div>

  <div class="ctrl">
    <div class="srchwrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="srch" id="srch" type="text" placeholder="Search skills, decos, categories&hellip;" autocomplete="off">
    </div>
    <div class="fgroup">
      <span class="flabel">Category</span>
      <div id="catFilters" style="display:flex;flex-wrap:wrap;gap:.35rem"></div>
    </div>
    <button class="nxbtn" id="nxbtn">Show N / X</button>
  </div>

  <div class="legend">
    <div class="li"><div class="lp" style="background:var(--tier-s-bg);color:var(--tier-s);border:1px solid var(--tier-s)">S</div>Essential / Best-in-slot</div>
    <div class="li"><div class="lp" style="background:var(--tier-a-bg);color:var(--tier-a);border:1px solid var(--tier-a)">A</div>Very strong</div>
    <div class="li"><div class="lp" style="background:var(--tier-b-bg);color:var(--tier-b);border:1px solid var(--tier-b)">B</div>Situationally useful</div>
    <div class="li"><div class="lp" style="background:var(--tier-c-bg);color:var(--tier-c);border:1px solid var(--tier-c)">C</div>Niche / filler</div>
    <div class="li"><div class="lp" style="background:var(--tier-n-bg);color:var(--tier-n);border:1px solid var(--tier-n)">N</div>Not applicable</div>
    <div class="li"><div class="lp" style="background:var(--tier-x-bg);color:var(--tier-x);border:1px solid var(--tier-x)">X</div>DO NOT USE</div>
  </div>

  <div id="tierList"></div>

</main>

<script>
const DATA={"meta":{"game":"Monster Hunter Rise: Sunbreak","version":"16.0.0 (Final Update)","source":"https://gamecat.fun/rise/en/index.php?title=SkillAndDeco","tiers":{"S":"Essential / Best-in-slot for this weapon. Always consider running.","A":"Very strong and recommended. Worth slotting if possible.","B":"Situationally useful or a solid secondary option.","C":"Minor benefit, niche, or easily replaced.","N":"Not applicable / no meaningful effect for this weapon.","X":"DO NOT USE \u2014 wastes slots, conflicts with playstyle, or has zero effect."},"weapons":["GS","LS","SNS","DB","Lance","GL","Hammer","HH","SA","CB","IG","LBG","HBG","Bow"]},"skills":[{"id":"attack_boost","name":"Attack Boost","category":"Offense - Raw","maxLevel":7,"decoName":"Attack Jewel 2 / Attack Jewel+ 4","decoSlot":2,"description":"Increases attack power.","levels":["Attack +3","Attack +6","Attack +9","Attack +5% Bonus: +7","Attack +6% Bonus: +8","Attack +8% Bonus: +9","Attack +10% Bonus: +10"],"ratings":{"GS":"A","LS":"A","SNS":"A","DB":"B","Lance":"A","GL":"B","Hammer":"A","HH":"A","SA":"A","CB":"A","IG":"A","LBG":"B","HBG":"B","Bow":"B"},"notes":"Strong universally at Lv4+. Raw weapons benefit most. Elemental weapons prefer elemental skills."},{"id":"agitator","name":"Agitator","category":"Offense - Conditional","maxLevel":5,"decoName":"Challenger Jewel 2 / Challenger Jewel+ 4","decoSlot":2,"description":"Increases attack power and affinity when large monsters become enraged.","levels":["Attack +4, Affinity +3% while active","Attack +8, Affinity +5% while active","Attack +12, Affinity +7% while active","Attack +16, Affinity +10% while active","Attack +20, Affinity +15% while active"],"ratings":{"GS":"A","LS":"S","SNS":"A","DB":"S","Lance":"A","GL":"B","Hammer":"A","HH":"A","SA":"A","CB":"A","IG":"A","LBG":"A","HBG":"A","Bow":"A"},"notes":"Monsters are enraged often. One of the best conditional offensive skills in Sunbreak."},{"id":"peak_performance","name":"Peak Performance","category":"Of es":"Gathering only. No combat value."},{"id":"geologist","name":"Geologist","category":"Gathering","maxLevel":3,"decoName":"Geology Jewel 1 / Hard Geology Jewel 4","decoSlot":1,"description":"Increases the number of times you can use a gathering point.","levels":["+1 gather from bonepiles","+1 gather from gathering points","+1 gather from mining outcrops"],"ratings":{"GS":"C","LS":"C","SNS":"C","DB":"C","Lance":"C","GL":"C","Hammer":"C","HH":"C","SA":"C","CB":"C","IG":"C","LBG":"C","HBG":"C","Bow":"C"},"notes":"Gathering only. No combat value."},{"id":"mushroomancer","name":"Mushroomancer","category":"Utility","maxLevel":3,"decoName":"Fungiform Jewel 3 / Fungiform Jewel+ 4","decoSlot":3,"description":"Lets you digest mushrooms that would otherwise be inedible.","levels":["Digest blue mushrooms and toadstools","Also digest nitroshrooms and parashrooms","Also digest mandragoras and exciteshrooms"],"ratings":{"GS":"C","LS":"C","SNS":"C","DB":"C","Lance":"C","GL":"C","Hammer":"C","HH":"C","SA":"C","CB":"C","IG":"C","LBG":"C","HBG":"C","Bow":"C"},"notes":"Niche utility. Exciteshroom mimics max potions. Mandragora recovers full health. Interesting but slot-inefficient."},{"id":"item_prolonger","name":"Item Prolonger","category":"Utility","maxLevel":3,"decoName":"Enduring Jewel 2 / Hard Enduring Jewel 4","decoSlot":2,"description":"Extends the duration of some item effects.","levels":["Item effect duration +10%","Item effect duration +25%","Item effect duration +50%"],"ratings":{"GS":"C","LS":"C","SNS":"C","DB":"C","Lance":"C","GL":"C","Hammer":"C","HH":"C","SA":"C","CB":"C","IG":"C","LBG":"C","HBG":"C","Bow":"C"},"notes":"Minor QoL for extending Demon Drug, Might Seed, etc. Rarely worth a slot."},{"id":"wide_range","name":"Wide-Range","category":"Utility","maxLevel":5,"decoName":"Friendship Jewel 2 / Hard Friendship Jewel 3 / Hard Friendship Jewel+ 4","decoSlot":2,"description":"Allows the effects of certain items to also affect nearby allies.","levels":["Items affect allies at 33% efficacy (small radius)","Items affect allies at 33% efficacy (wider radius)","Items affect allies at 66% efficacy (wider radius)","Items affect allies at 66% efficacy (much wider radius)","Items affect allies at full efficacy (much wider radius)"],"ratings":{"GS":"C","LS":"C","SNS":"B","DB":"C","Lance":"C","GL":"C","Hammer":"C","HH":"A","SA":"C","CB":"C","IG":"C","LBG":"C","HBG":"C","Bow":"C"},"notes":"Support-oriented. SNS and HH are natural support weapons. Not useful in solo play."},{"id":"free_meal","name":"Free Meal","category":"Utility","maxLevel":3,"decoName":"Satiated Jewel 1 / Hard Satiated Jewel 4","decoSlot":1,"description":"Chance of consuming a food or drink item for free.","levels":["Activates 10% of the time","Activates 25% of the time","Activates 45% of the time"],"ratings":{"GS":"C","LS":"C","SNS":"C","DB":"C","Lance":"C","GL":"C","Hammer":"C","HH":"C","SA":"C","CB":"C","IG":"C","LBG":"C","HBG":"C","Bow":"C"},"notes":"QoL filler. Cheap slot 1. Mildly useful."},{"id":"bubbly_dance","name":"Bubbly Dance","category":"Utility","maxLevel":3,"decoName":"Bubble Jewel 2 / Bubble Jewel+ 4","decoSlot":2,"description":"Reduces bubbleblight and grants increased evasion when afflicted.","levels":["Reduces major bubbleblight effects","Converts major to minor bubbleblight, increases evasiveness","Also inflicts bubbleblight when doing consecutive evades"],"ratings":{"GS":"C","LS":"C","SNS":"C","DB":"B","Lance":"C","GL":"C","Hammer":"C","HH":"C","SA":"C","CB":"C","IG":"C","LBG":"C","HBG":"C","Bow":"C"},"notes":"Lv3 is interesting \u2014 grants evasion bonus buff during combat. Niche but fun on evasion-heavy weapons."},{"id":"bombardier","name":"Bombardier","category":"Utility","maxLevel":3,"decoName":"Bomber Jewel 1 / Hard Bomber Jewel 4","decoSlot":1,"description":"Increases the damage of explosive items.","levels":["Explosive power +10%","Explosive power +20%","Explosive power +30%"],"ratings":{"GS":"C","LS":"C","SNS":"C","DB":"C","Lance":"C","GL":"C","Hammer":"C","HH":"C","SA":"C","CB":"C","IG":"C","LBG":"C","HBG":"C","Bow":"C"},"notes":"Only affects bomb items, not weapon attacks. Purely farming/trap utility."},{"id":"capture_master","name":"Capture Master","category":"Gathering","maxLevel":1,"decoName":"None","decoSlot":null,"description":"High chance of increased capture rewards.","levels":["Activates skill effect"],"ratings":{"GS":"C","LS":"C","SNS":"C","DB":"C","Lance":"C","GL":"C","Hammer":"C","HH":"C","SA":"C","CB":"C","IG":"C","LBG":"C","HBG":"C","Bow":"C"},"notes":"Armor skill only. Farm utility."},{"id":"carving_master","name":"Carving Master","category":"Gathering","maxLevel":1,"decoName":"None","decoSlot":null,"description":"Lets you carve one additional time.","levels":["Activates skill effect"],"ratings":{"GS":"C","LS":"C","SNS":"C","DB":"C","Lance":"C","GL":"C","Hammer":"C","HH":"C","SA":"C","CB":"C","IG":"C","LBG":"C","HBG":"C","Bow":"C"},"notes":"Armor skill only. Farm utility."}]};
const WM={"GS": {"full": "Great Sword", "icon": "GS"}, "LS": {"full": "Long Sword", "icon": "LS"}, "SNS": {"full": "Sword & Shield", "icon": "SNS"}, "DB": {"full": "Dual Blades", "icon": "DB"}, "Lance": {"full": "Lance", "icon": "LA"}, "GL": {"full": "Gunlance", "icon": "GL"}, "Hammer": {"full": "Hammer", "icon": "HA"}, "HH": {"full": "Hunting Horn", "icon": "HH"}, "SA": {"full": "Switch Axe", "icon": "SA"}, "CB": {"full": "Charge Blade", "icon": "CB"}, "IG": {"full": "Insect Glaive", "icon": "IG"}, "LBG": {"full": "Light Bowgun", "icon": "LBG"}, "HBG": {"full": "Heavy Bowgun", "icon": "HBG"}, "Bow": {"full": "Bow", "icon": "BOW"}};
const TORDER=['S','A','B','C','N','X'];
const TDESC={S:'Essential — always consider running',A:'Very strong — worth slotting',B:'Situationally useful',C:'Niche / filler',N:'Not applicable for this weapon',X:'DO NOT USE — wastes slots'};

let aw='GS', cats=new Set(), showNX=false, sq='';

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function buildWeapons(){
  const g=document.getElementById('wgrid');
  DATA.meta.weapons.forEach(w=>{
    const m=WM[w];
    const b=document.createElement('button');
    b.className='wbtn'+(w===aw?' active':'');
    b.dataset.w=w;
    b.innerHTML=`${m.full}<span class="ab">${w}</span>`;
    b.onclick=()=>{aw=w;document.querySelectorAll('.wbtn').forEach(x=>x.classList.remove('active'));b.classList.add('active');render()};
    g.appendChild(b);
  });
}

function buildCats(){
  const all=[...new Set(DATA.skills.map(s=>s.category))].sort();
  const wrap=document.getElementById('catFilters');
  const ab=document.createElement('button');
  ab.className='fbtn active';ab.textContent='All';ab.dataset.c='__all__';
  ab.onclick=()=>{cats.clear();wrap.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('active'));ab.classList.add('active');render()};
  wrap.appendChild(ab);
  all.forEach(cat=>{
    const b=document.createElement('button');
    b.className='fbtn';
    b.textContent=cat.replace('Offense - ','').replace('Ammo/Coating','Ammo').replace('Resistance','Resist');
    b.title=cat;b.dataset.c=cat;
    b.onclick=()=>{
      cats.has(cat)?cats.delete(cat):cats.add(cat);
      if(cats.size===0){wrap.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('active'));ab.classList.add('active')}
      else{ab.classList.remove('active');b.classList.toggle('active',cats.has(cat))}
      render();
    };
    wrap.appendChild(b);
  });
}

function render(){
  const c=document.getElementById('tierList');
  const q=sq.toLowerCase();
  let skills=DATA.skills.filter(s=>{
    const r=s.ratings[aw];
    if(!showNX&&(r==='N'||r==='X'))return false;
    if(cats.size>0&&!cats.has(s.category))return false;
    if(q){
      const h=(s.name+s.category+s.description+s.notes+s.decoName).toLowerCase();
      if(!h.includes(q))return false;
    }
    return true;
  });

  const byT={};TORDER.forEach(t=>byT[t]=[]);
  skills.forEach(s=>{const t=s.ratings[aw];if(byT[t])byT[t].push(s)});
  const active=TORDER.filter(t=>byT[t].length>0);

  if(!active.length){c.innerHTML='<div class="empty">No skills match the current filters.</div>';return}

  c.innerHTML=active.map(tier=>{
    const ts=byT[tier];
    return `<section class="ts ts-${tier}">
      <div class="thead">
        <div class="tbadge">${tier}</div>
        <span class="ttitle">${TDESC[tier]}</span>
        <span class="trule"></span>
        <span class="tcount">${ts.length} skill${ts.length!==1?'s':''}</span>
      </div>
      <div class="sgrid">${ts.map(s=>card(s,tier)).join('')}</div>
    </section>`;
  }).join('');

  c.querySelectorAll('.sc-toggle').forEach(btn=>{
    btn.onclick=()=>{
      const d=btn.nextElementSibling;
      const o=d.classList.toggle('open');
      btn.classList.toggle('open',o);
      btn.querySelector('.tt').textContent=o?'Hide levels':'Show levels';
    };
  });
}

function card(s,t){
  const ds=s.decoSlot?` [Lv${s.decoSlot}]`:'';
  const lvs=s.levels.map((l,i)=>`<li><span class="lvpip">Lv${i+1}</span>${esc(l)}</li>`).join('');
  const decoHtml=s.decoName!=='None'?`<div class="sc-deco"><span class="deco-tag" title="${esc(s.decoName)}">${esc(s.decoName)}${ds}</span></div>`:'';
  return `<div class="sc sc-${t}">
    <div class="sc-head">
      <div class="sc-pip">${t}</div>
      <div class="sc-tw">
        <div class="sc-name">${esc(s.name)}</div>
        <div class="sc-cat">${esc(s.category)}</div>
      </div>
    </div>
    ${decoHtml}
    <div class="sc-desc">${esc(s.description)}</div>
    <button class="sc-toggle">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      <span class="tt">Show levels</span>
    </button>
    <div class="sc-details">
      <ul class="lvls">${lvs}</ul>
      ${s.notes?`<div class="note">${esc(s.notes)}</div>`:''}
    </div>
  </div>`;
}

document.getElementById('srch').oninput=e=>{sq=e.target.value.trim();render()};
document.getElementById('nxbtn').onclick=function(){showNX=!showNX;this.classList.toggle('on',showNX);this.textContent=showNX?'Hide N / X':'Show N / X';render()};

buildWeapons();
buildCats();
render();
</script>
</body>
</html>
